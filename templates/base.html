<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FinTech App</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Floating Chat Button Styling */
        #ai-chat-bubble {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            z-index: 1050;
            font-size: 28px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
        }
        #ai-chat-bubble:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4) !important;
        }

        /* Slide-out Drawer Panel Styling */
        #ai-chat-drawer {
            position: fixed;
            top: 0;
            right: -420px;
            width: 400px;
            height: 100vh;
            z-index: 1060;
            transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 0;
            border-left: 1px solid rgba(0, 0, 0, 0.1);
        }
        #ai-chat-drawer.open {
            right: 0 !important;
        }

        /* Hide scrollbars but keep functionality */
        .scrollbar-none::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-none {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">FinTech Dashboard</span>

    <div>
        <a href="/" class="btn btn-light btn-sm">Dashboard</a>
        <a href="/transactions/" class="btn btn-light btn-sm">Transactions</a>
        <a href="/analytics/" class="btn btn-light btn-sm">Analytics</a>
        <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- Floating AI Chat Trigger Bubble -->
<button id="ai-chat-bubble" class="btn btn-primary rounded-circle shadow-lg d-flex align-items-center justify-content-center">
    💬
</button>

<!-- AI Chat Sidebar Drawer -->
<div id="ai-chat-drawer" class="card shadow-lg bg-light">
    <!-- Header -->
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
        <div class="d-flex align-items-center">
            <span class="fs-4 me-2">🤖</span>
            <div>
                <h6 class="mb-0 fw-bold">Antigravity AI</h6>
                <small class="text-success" style="font-size: 11px;">● Active financial advisor</small>
            </div>
        </div>
        <button type="button" class="btn-close btn-close-white" id="close-ai-chat" aria-label="Close"></button>
    </div>

    <!-- Message Logs -->
    <div class="card-body d-flex flex-column p-0" style="height: calc(100vh - 70px); overflow: hidden;">
        <!-- Scrollable messaging body -->
        <div id="ai-chat-messages" class="flex-grow-1 p-3" style="overflow-y: auto;">
            <div class="d-flex align-items-start mb-3 justify-content-start">
                <div class="bg-white border rounded p-3 text-dark shadow-sm small" style="max-width: 85%;">
                    Hello! I am your <strong>Antigravity</strong> personal finance assistant. I have full context of your transactions and stock holdings. Ask me anything!
                </div>
            </div>
        </div>

        <!-- Suggestion Chips -->
        <div id="ai-chat-suggestions" class="px-3 py-2 border-top bg-white d-flex gap-1 overflow-x-auto scrollbar-none" style="white-space: nowrap;">
            <button class="btn btn-outline-secondary btn-sm rounded-pill px-2 py-1" style="font-size: 11px;" onclick="sendSuggestion('Am I on track with my monthly budget?')">Budget Status</button>
            <button class="btn btn-outline-secondary btn-sm rounded-pill px-2 py-1" style="font-size: 11px;" onclick="sendSuggestion('Analyze my portfolio holdings ROI')">Portfolio Analysis</button>
            <button class="btn btn-outline-secondary btn-sm rounded-pill px-2 py-1" style="font-size: 11px;" onclick="sendSuggestion('Suggest 3 ways I can increase my savings')">Savings Tips</button>
        </div>

        <!-- Input Form bar -->
        <div class="p-3 border-top bg-white">
            <form id="ai-chat-form" onsubmit="handleChatSubmit(event)">
                <div class="input-group">
                    <input type="text" id="ai-chat-input" class="form-control" placeholder="Ask about your finance..." autocomplete="off">
                    <button class="btn btn-primary" type="submit" id="ai-chat-send-btn">Send</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    let chatHistory = [];

    document.addEventListener("DOMContentLoaded", () => {
        const token = localStorage.getItem("access");
        const bubble = document.getElementById("ai-chat-bubble");
        if (!token && bubble) {
            bubble.style.display = "none";
        }
    });

    // Toggle drawer mechanisms
    const bubble = document.getElementById("ai-chat-bubble");
    const drawer = document.getElementById("ai-chat-drawer");
    const closeBtn = document.getElementById("close-ai-chat");

    if (bubble && drawer && closeBtn) {
        bubble.addEventListener("click", () => {
            drawer.classList.toggle("open");
        });

        closeBtn.addEventListener("click", () => {
            drawer.classList.remove("open");
        });
    }

    function appendMessage(role, text) {
        const chatContainer = document.getElementById("ai-chat-messages");
        if (!chatContainer) return;

        const messageWrapper = document.createElement("div");
        messageWrapper.className = `d-flex mb-3 ${role === 'user' ? 'justify-content-end' : 'justify-content-start'}`;

        const innerDiv = document.createElement("div");
        if (role === 'user') {
            innerDiv.className = "text-white rounded p-3 shadow-sm small";
            innerDiv.style.maxWidth = "85%";
            innerDiv.style.background = "linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%)";
        } else {
            innerDiv.className = "bg-white border rounded p-3 text-dark shadow-sm small";
            innerDiv.style.maxWidth = "85%";
        }

        // Format markdown: replace **text** with bold tags, *text* with italics, and newlines with br tags
        let formattedText = text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/\n/g, '<br>');

        innerDiv.innerHTML = formattedText;
        messageWrapper.appendChild(innerDiv);
        chatContainer.appendChild(messageWrapper);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function sendSuggestion(text) {
        const input = document.getElementById("ai-chat-input");
        if (input) {
            input.value = text;
            const form = document.getElementById("ai-chat-form");
            if (form) {
                form.dispatchEvent(new Event('submit', { cancelable: true }));
            }
        }
    }

    async function handleChatSubmit(event) {
        event.preventDefault();
        const input = document.getElementById("ai-chat-input");
        const sendBtn = document.getElementById("ai-chat-send-btn");
        if (!input || !sendBtn) return;

        const msg = input.value.trim();
        if (!msg) return;

        // Render user message immediately
        appendMessage('user', msg);
        input.value = "";

        // Disable input while waiting for AI response
        input.disabled = true;
        sendBtn.disabled = true;

        const chatContainer = document.getElementById("ai-chat-messages");
        const typingIndicator = document.createElement("div");
        typingIndicator.id = "ai-typing-indicator";
        typingIndicator.className = "d-flex mb-3 justify-content-start";
        typingIndicator.innerHTML = `
            <div class="bg-white border rounded p-3 text-muted shadow-sm small d-flex align-items-center">
                <span class="spinner-grow spinner-grow-sm me-2 text-primary" role="status" aria-hidden="true"></span>
                Antigravity is analyzing...
            </div>
        `;
        chatContainer.appendChild(typingIndicator);
        chatContainer.scrollTop = chatContainer.scrollHeight;

        const token = localStorage.getItem("access");
        try {
            const res = await fetch("/api/analytics/chat/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    message: msg,
                    history: chatHistory
                })
            });

            const indicator = document.getElementById("ai-typing-indicator");
            if (indicator) indicator.remove();

            if (res.ok) {
                const data = await res.json();
                const reply = data.response;
                appendMessage('model', reply);

                // Add to persistent local chat history
                chatHistory.push({ role: 'user', content: msg });
                chatHistory.push({ role: 'model', content: reply });
            } else {
                const err = await res.json();
                appendMessage('model', `⚠️ Error: ${err.error || 'Failed to analyze request.'}`);
            }
        } catch (e) {
            const indicator = document.getElementById("ai-typing-indicator");
            if (indicator) indicator.remove();
            appendMessage('model', "⚠️ Network failure. Could not reach server.");
        } finally {
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
        }
    }

function logout() {
    localStorage.removeItem("access");
    window.location.href = "/login/";
}
</script>

</body>
</html>
