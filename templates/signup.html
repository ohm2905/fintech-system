<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width:400px;">
    
    <div class="card p-4 shadow">
        <h3 class="text-center mb-3">Signup</h3>

        <input type="text" id="username" class="form-control mb-3" placeholder="Username">
        <input type="email" id="email" class="form-control mb-3" placeholder="Email">
        <input type="password" id="password" class="form-control mb-3" placeholder="Password">

        <button onclick="signup()" class="btn btn-success w-100">Signup</button>

        <p class="mt-3 text-center">
            Already have an account? <a href="/login/">Login</a>
        </p>
    </div>

</div>

<script>

async function signup() {
    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const response = await fetch("/api/auth/signup/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, email, password })
    });

    if (response.ok) {
        alert("Signup successful! Please login.");
        window.location.href = "/login/";
    } else {
        const data = await response.json();
        alert(data.error || "Error signing up");
    }
}

</script>

</body>
</html>
